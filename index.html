<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b1220" />
<title>Dominó · Marcador</title>
<style>
/* ============ RESET & TOKENS ============ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a1020;
  --bg-2:#0f1729;
  --surface:#131c30;
  --surface-2:#18233c;
  --surface-3:#1f2c49;
  --border:rgba(255,255,255,.07);
  --border-strong:rgba(255,255,255,.14);
  --text:#eef2ff;
  --text-dim:#a6b0c8;
  --text-mute:#6b7490;
  --primary:#10b981;
  --primary-2:#059669;
  --primary-soft:rgba(16,185,129,.15);
  --danger:#ef4444;
  --danger-soft:rgba(239,68,68,.12);
  --warning:#f59e0b;
  --warning-soft:rgba(245,158,11,.12);
  --info:#3b82f6;
  --info-soft:rgba(59,130,246,.12);
  --teamA:#3b82f6;
  --teamB:#ef4444;
  --shadow-lg:0 24px 60px -16px rgba(0,0,0,.6),0 8px 18px rgba(0,0,0,.35);
  --shadow-card:0 1px 0 rgba(255,255,255,.04) inset, 0 10px 30px -12px rgba(0,0,0,.6);
  --radius-sm:10px;
  --radius:14px;
  --radius-lg:20px;
  --radius-xl:28px;
}
html,body{height:100%}
body{
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(1200px 800px at 15% -10%, rgba(16,185,129,.10), transparent 60%),
    radial-gradient(900px 700px at 110% 10%, rgba(59,130,246,.08), transparent 60%),
    radial-gradient(800px 600px at 50% 120%, rgba(245,158,11,.05), transparent 60%),
    var(--bg);
  min-height:100svh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;
}
button{font-family:inherit;color:inherit;background:none;border:0;cursor:pointer}
input,select,textarea{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.16)}

/* ============ LAYOUT ============ */
.app{
  max-width:720px;
  margin:0 auto;
  min-height:100svh;
  padding:0 16px calc(100px + env(safe-area-inset-bottom,0)) 16px;
  position:relative;
}
.topbar{
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;gap:12px;
  padding:18px 4px 14px;
  background:linear-gradient(180deg, var(--bg) 60%, rgba(10,16,32,0));
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.topbar .back{
  width:40px;height:40px;border-radius:12px;display:none;align-items:center;justify-content:center;
  background:var(--surface);border:1px solid var(--border);
  transition:transform .15s ease, background .2s ease;
}
.topbar .back:hover{background:var(--surface-2)}
.topbar .back:active{transform:scale(.95)}
.topbar.has-back .back{display:flex}
.topbar h1{
  font-size:22px;font-weight:700;letter-spacing:-.02em;
  display:flex;align-items:center;gap:10px;
}
.topbar h1 .logo{
  width:30px;height:30px;border-radius:9px;
  background:linear-gradient(135deg, var(--primary) 0%, #34d399 60%, #fbbf24 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 20px -6px rgba(16,185,129,.55);
  position:relative;overflow:hidden;
}
.topbar h1 .logo::after{
  content:"";position:absolute;inset:3px;border-radius:6px;
  background:
    radial-gradient(circle at 30% 30%, #0a1020 2px, transparent 2.5px),
    radial-gradient(circle at 70% 70%, #0a1020 2px, transparent 2.5px),
    linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,255,255,.75));
}
.topbar .spacer{flex:1}
.topbar .right-action{
  height:38px;padding:0 14px;border-radius:10px;
  background:var(--surface);border:1px solid var(--border);
  font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:6px;
  transition:background .2s ease,transform .15s ease;
}
.topbar .right-action:hover{background:var(--surface-2)}
.topbar .right-action:active{transform:scale(.96)}

/* ============ VIEWS ============ */
.view{display:none;animation:fadeSlide .22s ease}
.view.active{display:block}
@keyframes fadeSlide{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:none}
}

/* ============ CARDS ============ */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:18px;
  box-shadow:var(--shadow-card);
}
.card + .card{margin-top:14px}
.card-hero{
  background:
    radial-gradient(600px 160px at 0% 0%, rgba(16,185,129,.20), transparent 70%),
    radial-gradient(400px 160px at 100% 100%, rgba(59,130,246,.20), transparent 70%),
    linear-gradient(160deg, var(--surface-2) 0%, var(--surface) 100%);
  border:1px solid var(--border-strong);
}
.section-title{
  display:flex;align-items:center;justify-content:space-between;
  margin:20px 4px 10px;
}
.section-title h2{
  font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text-dim);
}

/* ============ BUTTONS ============ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  height:46px;padding:0 18px;border-radius:12px;
  font-weight:600;font-size:15px;
  background:var(--surface-2);border:1px solid var(--border);
  transition:background .2s,transform .12s,border-color .2s;
  white-space:nowrap;
}
.btn:hover{background:var(--surface-3)}
.btn:active{transform:scale(.97)}
.btn.block{width:100%}
.btn.sm{height:36px;font-size:13.5px;padding:0 12px;border-radius:10px}
.btn.lg{height:54px;font-size:16px;padding:0 22px}
.btn-primary{background:linear-gradient(180deg,#10b981,#059669);border-color:transparent;color:white;
  box-shadow:0 10px 24px -10px rgba(16,185,129,.6)}
.btn-primary:hover{background:linear-gradient(180deg,#14c28e,#047857)}
.btn-ghost{background:transparent;border-color:var(--border)}
.btn-ghost:hover{background:var(--surface-2)}
.btn-danger{background:var(--danger-soft);color:#fca5a5;border-color:rgba(239,68,68,.3)}
.btn-danger:hover{background:rgba(239,68,68,.22)}
.btn-outline-primary{background:transparent;border-color:var(--primary);color:var(--primary)}
.btn-outline-primary:hover{background:var(--primary-soft)}

/* ============ FORMS ============ */
.field{display:block;margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--text-dim);margin-bottom:6px;letter-spacing:.02em}
.field input[type=text],
.field input[type=number],
.field select,
.field textarea{
  width:100%;height:46px;padding:0 14px;
  background:var(--bg-2);color:var(--text);
  border:1px solid var(--border);border-radius:12px;
  font-size:15px;outline:none;transition:border-color .2s, background .2s;
}
.field textarea{height:auto;min-height:80px;padding:12px 14px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);background:var(--bg)}
.field .hint{font-size:12px;color:var(--text-mute);margin-top:6px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ============ QUICK ACTIONS ============ */
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.qa{
  position:relative;
  padding:16px 16px 18px;border-radius:var(--radius);
  background:var(--surface);border:1px solid var(--border);
  text-align:left;overflow:hidden;
  transition:transform .15s ease, background .2s ease, border-color .2s;
}
.qa:hover{background:var(--surface-2);border-color:var(--border-strong)}
.qa:active{transform:scale(.98)}
.qa .ico{
  width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  background:var(--primary-soft);color:var(--primary);margin-bottom:10px;
}
.qa h3{font-size:15px;font-weight:700;margin-bottom:2px}
.qa p{font-size:12.5px;color:var(--text-dim)}
.qa.qa-warn .ico{background:var(--warning-soft);color:var(--warning)}
.qa.qa-info .ico{background:var(--info-soft);color:var(--info)}
.qa.qa-danger .ico{background:var(--danger-soft);color:var(--danger)}

/* ============ STATS GRID ============ */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 12px 14px;
}
.stat .n{font-size:24px;font-weight:800;letter-spacing:-.02em}
.stat .l{font-size:11.5px;color:var(--text-dim);margin-top:2px}

/* ============ PLAYER CARDS ============ */
.player-card{
  display:flex;align-items:center;gap:14px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;
  transition:background .2s, border-color .2s, transform .15s;
}
.player-card + .player-card{margin-top:10px}
.player-card:hover{background:var(--surface-2);border-color:var(--border-strong)}
.player-card .avatar{
  width:48px;height:48px;border-radius:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:15px;color:#fff;letter-spacing:-.02em;
  background:linear-gradient(135deg, #3b82f6, #8b5cf6);
  box-shadow:0 8px 20px -8px rgba(0,0,0,.5);
}
.player-card .info{flex:1;min-width:0}
.player-card .info .name{font-size:15.5px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-card .info .sub{font-size:12.5px;color:var(--text-dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-card .meta-right{text-align:right;margin-left:auto}
.player-card .chip{
  font-size:11px;padding:3px 8px;border-radius:999px;
  background:var(--surface-3);color:var(--text-dim);
}
.player-card .actions{display:flex;gap:6px}
.icon-btn{
  width:36px;height:36px;border-radius:10px;
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--surface-2);border:1px solid var(--border);
  transition:background .2s, transform .15s, color .2s;
  color:var(--text-dim);
}
.icon-btn:hover{background:var(--surface-3);color:var(--text)}
.icon-btn:active{transform:scale(.94)}
.icon-btn.danger:hover{color:#fca5a5;background:var(--danger-soft)}

/* ============ PICK ROWS ============ */
.pick-row{
  display:flex;align-items:center;gap:12px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 12px;
  cursor:pointer;user-select:none;
  transition:background .2s,border-color .2s,transform .12s;
  width:100%;margin-bottom:8px;
}
.pick-row:hover{background:var(--surface-2)}
.pick-row.selected{border-color:var(--primary);background:rgba(16,185,129,.08)}
.pick-row .avatar{width:38px;height:38px;border-radius:12px;font-size:12px}
.pick-row .info{flex:1;text-align:left;min-width:0}
.pick-row .name{font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pick-row .sub{font-size:11.5px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pick-row .check{
  width:22px;height:22px;border-radius:999px;
  border:2px solid var(--border-strong);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.pick-row.selected .check{background:var(--primary);border-color:var(--primary)}
.pick-row.selected .check svg{stroke:#0a1020}
.pick-row .ab-toggle{display:flex;gap:4px}
.pick-row .ab-toggle button{
  width:34px;height:32px;border-radius:9px;font-weight:800;font-size:13px;
  background:var(--surface-3);border:1px solid var(--border);color:var(--text-dim);
}
.pick-row .ab-toggle button.active.a{background:rgba(59,130,246,.28);color:#bfdbfe;border-color:rgba(59,130,246,.5)}
.pick-row .ab-toggle button.active.b{background:rgba(239,68,68,.28);color:#fecaca;border-color:rgba(239,68,68,.5)}

/* ============ SCOREBOARD ============ */
.scoreboard{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px;
}
.score-side{
  position:relative;
  border-radius:var(--radius-lg);
  padding:18px 16px 16px;
  background:var(--surface);
  border:1px solid var(--border);
  overflow:hidden;
  min-height:160px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.score-side.A{
  background:
    radial-gradient(400px 160px at 0% 0%, rgba(59,130,246,.22), transparent 70%),
    linear-gradient(160deg, #101a34 0%, var(--surface) 100%);
  border-color:rgba(59,130,246,.3);
}
.score-side.B{
  background:
    radial-gradient(400px 160px at 100% 0%, rgba(239,68,68,.22), transparent 70%),
    linear-gradient(200deg, #1b1220 0%, var(--surface) 100%);
  border-color:rgba(239,68,68,.3);
}
.score-side .tag{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  padding:3px 8px;border-radius:999px;background:rgba(255,255,255,.05);
  color:var(--text-dim);align-self:flex-start;
}
.score-side.A .tag{color:#93c5fd;background:rgba(59,130,246,.12)}
.score-side.B .tag{color:#fca5a5;background:rgba(239,68,68,.12)}
.score-side .tname{font-size:15px;font-weight:700;margin-top:8px;line-height:1.2}
.score-side .tscore{
  font-size:54px;font-weight:900;letter-spacing:-.04em;line-height:1;
  background:linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  margin-top:14px;
}
.score-side .tscore.won{
  background:linear-gradient(180deg, #fde68a 0%, #f59e0b 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.score-side .progress{
  height:6px;border-radius:999px;background:rgba(255,255,255,.06);margin-top:10px;overflow:hidden;
}
.score-side .progress > span{
  display:block;height:100%;border-radius:999px;
  transition:width .4s cubic-bezier(.2,.8,.2,1);
}
.score-side.A .progress > span{background:linear-gradient(90deg,#60a5fa,#3b82f6)}
.score-side.B .progress > span{background:linear-gradient(90deg,#f87171,#ef4444)}

.round-panel{margin-top:14px}
.round-tabs{
  display:flex;background:var(--surface);padding:4px;border-radius:14px;border:1px solid var(--border);margin-bottom:10px;
}
.round-tabs button{
  flex:1;height:40px;border-radius:10px;font-weight:700;font-size:13.5px;color:var(--text-dim);
  transition:background .2s,color .2s;
}
.round-tabs button.A.active{color:#93c5fd;background:rgba(59,130,246,.14)}
.round-tabs button.B.active{color:#fca5a5;background:rgba(239,68,68,.14)}

.chips-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.chip-btn{
  height:48px;border-radius:12px;
  background:var(--surface);border:1px solid var(--border);
  font-weight:800;font-size:16px;color:var(--text);
  transition:transform .12s, background .2s, border-color .2s;
}
.chip-btn:hover{background:var(--surface-2)}
.chip-btn:active{transform:scale(.95)}

.add-custom{display:flex;gap:8px;margin-top:10px}
.add-custom input{
  flex:1;height:46px;padding:0 14px;
  background:var(--bg-2);color:var(--text);
  border:1px solid var(--border);border-radius:12px;font-size:15px;outline:none;
}
.add-custom input:focus{border-color:var(--primary)}

.rounds-list{margin-top:14px;max-height:240px;overflow-y:auto;border-top:1px solid var(--border);padding-top:10px}
.round-row{
  display:grid;grid-template-columns:32px 1fr 1fr 32px;align-items:center;gap:8px;
  padding:8px 4px;border-bottom:1px solid var(--border);font-size:14px;
}
.round-row:last-child{border-bottom:0}
.round-row .num{font-size:11.5px;color:var(--text-mute);font-weight:700}
.round-row .cellA{text-align:center;font-weight:700;color:#93c5fd}
.round-row .cellB{text-align:center;font-weight:700;color:#fca5a5}
.round-row .cellA.zero,.round-row .cellB.zero{color:var(--text-mute);font-weight:500}
.round-row .del{color:var(--text-mute)}
.round-row .del:hover{color:#fca5a5}

/* ============ EMPTY ============ */
.empty{
  text-align:center;padding:40px 20px;color:var(--text-dim);
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.empty .emoji{
  width:72px;height:72px;border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface);border:1px solid var(--border);color:var(--text-dim);
}
.empty h3{font-size:17px;color:var(--text);font-weight:700}
.empty p{font-size:14px;max-width:320px;line-height:1.45}

/* ============ MODAL ============ */
.modal-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(5,10,20,.72);backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  display:none;align-items:flex-end;justify-content:center;
  animation:overlayFade .2s ease;
}
.modal-overlay.open{display:flex}
@keyframes overlayFade{from{opacity:0}to{opacity:1}}
.modal{
  width:100%;max-width:560px;
  background:var(--bg-2);
  border:1px solid var(--border);
  border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  padding:20px 20px calc(24px + env(safe-area-inset-bottom,0));
  max-height:92svh;overflow-y:auto;
  animation:sheetUp .28s cubic-bezier(.2,.9,.2,1);
}
@keyframes sheetUp{from{transform:translateY(30px);opacity:.4}to{transform:none;opacity:1}}
@media (min-width:640px){
  .modal-overlay{align-items:center}
  .modal{border-radius:var(--radius-xl);max-height:86svh}
}
.modal .grab{
  width:46px;height:4px;border-radius:999px;background:rgba(255,255,255,.12);
  margin:-6px auto 14px;
}
.modal-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.modal-header h2{font-size:19px;font-weight:800;letter-spacing:-.02em}
.modal-header .close{margin-left:auto}
.modal-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.modal-actions .btn{flex:1;min-width:120px}

/* ============ BOTTOM NAV ============ */
.bottom-nav{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  padding:10px 10px calc(10px + env(safe-area-inset-bottom,0));
  background:linear-gradient(180deg, rgba(10,16,32,0), rgba(10,16,32,.9) 50%);
  display:flex;justify-content:center;pointer-events:none;
}
.bottom-nav-inner{
  pointer-events:auto;
  display:grid;grid-template-columns:repeat(4,1fr);gap:4px;
  background:rgba(19,28,48,.85);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid var(--border);
  border-radius:20px;
  padding:6px;
  box-shadow:var(--shadow-lg);
  width:100%;max-width:480px;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 4px;border-radius:14px;
  color:var(--text-mute);font-size:10.5px;font-weight:700;letter-spacing:.02em;
  transition:color .2s, background .2s;
}
.nav-btn:hover{color:var(--text-dim)}
.nav-btn.active{color:var(--text);background:var(--surface-2)}
.nav-btn.active svg{color:var(--primary)}
.nav-btn svg{width:22px;height:22px;color:currentColor;stroke-width:2;transition:color .2s}

/* ============ TOAST ============ */
.toast-container{position:fixed;top:max(18px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{
  min-width:220px;max-width:90vw;
  background:rgba(15,22,40,.95);color:var(--text);
  border:1px solid var(--border);border-radius:14px;
  padding:12px 16px;font-size:14px;font-weight:600;
  box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:10px;
  animation:toastIn .22s ease, toastOut .22s ease 2.1s forwards;
  pointer-events:auto;
}
.toast.success{border-color:rgba(16,185,129,.35)}
.toast.error{border-color:rgba(239,68,68,.35)}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px) scale(.98)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateY(-8px) scale(.98)}}

/* ============ PAIR BOXES ============ */
.pair-boxes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.pair-box{
  padding:12px;border-radius:14px;min-height:96px;
  border:1px solid var(--border);display:flex;flex-direction:column;gap:6px;
}
.pair-box.A{background:linear-gradient(160deg, rgba(59,130,246,.12), transparent);border-color:rgba(59,130,246,.3)}

/* ============ TOURNAMENT ============ */

}

.game-row .tm.right{text-align:right}

/* ============ UTILITY ============ */
.row{display:flex;align-items:center;gap:10px}
.mt-0{margin-top:0!important}
.mt-6{margin-top:6px}
.mt-8{margin-top:8px}
.mt-10{margin-top:10px}
.mt-14{margin-top:14px}
.mt-20{margin-top:20px}
.mb-0{margin-bottom:0!important}
.mb-10{margin-bottom:10px}
.mb-14{margin-bottom:14px}
.center{text-align:center}

<script>
/* ================================================================
   DATA MODEL + PERSISTENCE
================================================================ */
const STORE_KEY = "domino_app_v2";
const defaultState = {
  players: [],
  games: [],
  tournaments: [],
  settings: { defaultPoints: 100 }
};
let state = loadState();
let currentView = "home";
let viewStack = [];
let navContext = {};

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw){
      // try to migrate v1 (teams) if present
      const rawOld = localStorage.getItem("domino_app_v1");
      if(rawOld){
        try{
          const old = JSON.parse(rawOld);
          const migrated = migrateV1(old);
          localStorage.setItem(STORE_KEY, JSON.stringify(migrated));
          return migrated;
        }catch(e){}
      }
      return structuredClone(defaultState);
    }
    const parsed = JSON.parse(raw);
    return Object.assign({}, structuredClone(defaultState), parsed);
  }catch(e){
    console.warn("Storage reset:", e);
    return structuredClone(defaultState);
  }
}
function migrateV1(old){
  // Turn each team's two players into individual player entities; keep games referencing pairs
  const ns = structuredClone(defaultState);
  const playerByKey = {};
  function getOrCreate(name){
    const key = name.trim().toLowerCase();
    if(!playerByKey[key]){
      const p = { id: uid("pl"), name: name.trim(), notes:"", createdAt: nowISO() };
      ns.players.push(p);
      playerByKey[key] = p;
    }
    return playerByKey[key];
  }
  const teamMap = {};
  (old.teams||[]).forEach(t=>{
    const p1 = getOrCreate(t.player1||"Jugador 1");
    const p2 = getOrCreate(t.player2||"Jugador 2");
    teamMap[t.id] = [p1.id, p2.id];
  });
  (old.games||[]).forEach(g=>{
    const teamA = teamMap[g.teamAId]; const teamB = teamMap[g.teamBId];
    if(!teamA||!teamB) return;
    ns.games.push({
      id: g.id, teamA: {playerIds: teamA}, teamB: {playerIds: teamB},
      pointsToWin: g.pointsToWin, rounds: g.rounds||[],
      status: g.status, winnerTeam: g.winnerId===g.teamAId?"A":g.winnerId===g.teamBId?"B":null,
      tournamentId: g.tournamentId||null, startedAt: g.startedAt, finishedAt: g.finishedAt||null
    });
  });
  (old.tournaments||[]).forEach(t=>{
    const playerIds = [];
    t.teamIds.forEach(tid=>{
      (teamMap[tid]||[]).forEach(pid=>{ if(!playerIds.includes(pid)) playerIds.push(pid); });
    });
    ns.tournaments.push({
      id:t.id, name:t.name, playerIds,
      mode:"fixed",
      fixedPairs: t.teamIds.map(tid=>teamMap[tid]).filter(Boolean),
      pointsToWin:t.pointsToWin, status:t.status,
      createdAt:t.createdAt, finishedAt:t.finishedAt||null
    });
  });
  ns.settings = old.settings || ns.settings;
  return ns;
}
function saveState(){

function uid(prefix="id"){

function nowISO(){ return new Date().toISOString(); }

/* ================================================================
   UTILITIES
================================================================ */
function el(tag, attrs={}, children){
  const n = document.createElement(tag);
  for(const k in attrs){
    if(k==="class") n.className=attrs[k];
    else if(k==="html") n.innerHTML=attrs[k];
    else if(k.startsWith("on")&&typeof attrs[k]==="function") n.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if(attrs[k]!==undefined&&attrs[k]!==null) n.setAttribute(k, attrs[k]);
  }
  if(children){
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c==null) return;
      if(typeof c==="string"||typeof c==="number") n.appendChild(document.createTextNode(c));
      else n.appendChild(c);
    });
  }
  return n;
}
function $(sel){ return document.querySelector(sel); }
function $all(sel){ return [...document.querySelectorAll(sel)]; }
function esc(s){
  if(s==null) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function initials(name){
  if(!name) return "?";
  const parts = name.trim().split(/\s+/).slice(0,2);
  return parts.map(p=>p[0]).join("").toUpperCase();
}
function formatDate(iso, opts){
  const d = new Date(iso);
  const now = new Date();
  const sameDay = d.toDateString()===now.toDateString();
  const yd = new Date(now); yd.setDate(yd.getDate()-1);
  const isYest = d.toDateString()===yd.toDateString();
  const time = d.toLocaleTimeString("es", {hour:"2-digit",minute:"2-digit"});
  if(opts?.short){
    if(sameDay) return "Hoy · "+time;
    if(isYest) return "Ayer · "+time;
    return d.toLocaleDateString("es",{day:"2-digit",month:"short"})+" · "+time;
  }
  return d.toLocaleString("es",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
}
function avatarClass(seed){
  let h=0; for(const c of (seed||"")) h=(h*31+c.charCodeAt(0))|0;
  return "avg-"+(Math.abs(h)%8);
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function byId(id){ return state.players.find(p=>p.id===id); }
function pairName(playerIds){
  return (playerIds||[]).map(id=> byId(id)?.name || "?").join(" & ");
}

/* ================================================================

================================================================ */
function toast(msg, type="success"){
  const t = el("div",{class:"toast "+type}, msg);
  $("#toastContainer").appendChild(t);
  setTimeout(()=>t.remove(), 2400);
}
function openModal({title, body, actions=[], width}){
  $("#modalTitle").textContent = title||"";
  const bodyEl = $("#modalBody");
  bodyEl.innerHTML = "";
  if(typeof body === "string") bodyEl.innerHTML = body;
  else if(body) bodyEl.appendChild(body);

  actions.forEach(a=>{
    const b = el("button",{class:"btn "+(a.class||"btn-ghost")}, a.label);

function confirm2({title, message, confirmLabel="Confirmar", danger=false, onConfirm}){
  openModal({
    title,
    body: el("p",{class:"dim",html: esc(message)}),
    actions:[
      {label:"Cancelar", class:"btn-ghost"},
      {label:confirmLabel, class: danger?"btn-danger":"btn-primary", onClick:()=>{ onConfirm && onConfirm(); }}
    ]
  });
}

/* ================================================================
   NAVIGATION
================================================================ */
function navigate(view, ctx={}){
  currentView = view;
  navContext = ctx;
  $all(".view").forEach(v=>v.classList.remove("active"));
  const vEl = $("#view-"+view);
  if(vEl) vEl.classList.add("active");
  const navAlias = view==="tournament"?"tournaments":view==="player-stats"?"players":view==="game"?"":view;
  $all(".nav-btn").forEach(b=>b.classList.toggle("active", b.dataset.nav===navAlias));

  const showBack = !["home","players","tournaments","history"].includes(view);
  $("#topbar").classList.toggle("has-back", showBack);
  const title = titleForView(view, ctx);
  $("#topbarTitle").innerHTML = showBack
    ? `<span style="font-size:18px">${esc(title)}</span>`
    : `<span class="logo"></span><span>${esc(title)}</span>`;

  const ra = $("#rightAction");
  const raConfig = rightActionFor(view, ctx);
  if(raConfig){
    ra.classList.remove("hide");
    ra.innerHTML = raConfig.html;
    ra.onclick = raConfig.onClick;
  } else ra.classList.add("hide");

  renderView(view);
  window.scrollTo({top:0, behavior:"instant"});
}
function titleForView(v, ctx){
  switch(v){
    case "home": return "Dominó";
    case "players": return "Jugadores";
    case "tournaments": return "Pollas";
    case "history": return "Historial";
    case "tournament": {
      const t = state.tournaments.find(x=>x.id===ctx.tournamentId);
      return t?.name || "Polla";
    }
    case "game": return "Partida";
    case "player-stats": {
      const p = byId(ctx.playerId);
      return p?.name || "Jugador";
    }
  }
  return "Dominó";
}
function rightActionFor(v, ctx){
  if(v==="players") return {
    html: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg> Nuevo`,
    onClick: ()=>openPlayerModal()
  };
  if(v==="tournaments") return {
    html: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg> Nueva polla`,
    onClick: ()=>openTournamentModal()
  };
  return null;
}
$("#backBtn").addEventListener("click", ()=>{
  const back = viewStack.pop();
  if(back) navigate(back.view, back.ctx);
  else if(currentView==="tournament") navigate("tournaments");
  else if(currentView==="player-stats") navigate("players");
  else if(currentView==="game"){
    if(navContext.tournamentId) navigate("tournament",{tournamentId:navContext.tournamentId});
    else navigate("home");
  }
  else navigate("home");
});
function pushAndNavigate(view, ctx={}){
  viewStack.push({view:currentView, ctx:{...navContext}});
  navigate(view, ctx);
}

function computeRanking(){
  const byPid = {};
  state.players.forEach(p=>byPid[p.id]={playerId:p.id,wins:0,losses:0,games:0,pointsFor:0,pointsAgainst:0});
  state.games.forEach(g=>{
    if(g.status!=="finished") return;
    const {scoreA, scoreB} = tallyGame(g);
    (g.teamA.playerIds||[]).forEach(pid=>{
      const r = byPid[pid]; if(!r) return;
      r.games++; r.pointsFor += scoreA; r.pointsAgainst += scoreB;
      if(g.winnerTeam==="A") r.wins++; else if(g.winnerTeam==="B") r.losses++;
    });
    (g.teamB.playerIds||[]).forEach(pid=>{
      const r = byPid[pid]; if(!r) return;
      r.games++; r.pointsFor += scoreB; r.pointsAgainst += scoreA;
      if(g.winnerTeam==="B") r.wins++; else if(g.winnerTeam==="A") r.losses++;
    });
  });
  return Object.values(byPid)
    .filter(r=>r.games>0)
    .map(r=>({...r, winPct: Math.round((r.wins/Math.max(1,r.games))*100)}))
    .sort((a,b)=> b.wins-a.wins || b.winPct-a.winPct || (b.pointsFor-b.pointsAgainst)-(a.pointsFor-a.pointsAgainst));
}

  const existing = playerId ? byId(playerId) : null;

  ]));
  openModal({

      ...(existing?[{label:"Eliminar", class:"btn-danger", onClick:()=>{ deletePlayer(existing.id); return true; }}]:[]),

function deletePlayer(id){
  const p = byId(id); if(!p) return;
  const inActiveGame = state.games.some(g=>g.status==="active" && (g.teamA.playerIds.includes(id)||g.teamB.playerIds.includes(id)));
  const inActiveTour = state.tournaments.some(t=>t.status==="active" && t.playerIds.includes(id));
  if(inActiveGame||inActiveTour){
    toast("No se puede eliminar: jugador en partida/polla activa","error"); return;
  }
  confirm2({
    title:"¿Eliminar jugador?",
    message:`Se eliminará "${p.name}". Las partidas previas quedarán en el historial con su nombre actual.`,
    confirmLabel:"Eliminar", danger:true,
    onConfirm:()=>{
      state.players = state.players.filter(x=>x.id!==id);
      saveState(); toast("Jugador eliminado");
      renderView(currentView);
    }
  });
}

/* ================================================================
   GAME UTILITIES
================================================================ */
function tallyGame(g){
  let scoreA=0, scoreB=0;
  (g.rounds||[]).forEach(r=>{ scoreA += r.teamA||0; scoreB += r.teamB||0; });
  return {scoreA, scoreB};
}
function checkWinner(g){
  const {scoreA,scoreB} = tallyGame(g);
  if(scoreA>=g.pointsToWin && scoreA>scoreB) return "A";
  if(scoreB>=g.pointsToWin && scoreB>scoreA) return "B";
  return null;
}
function openGame(gameId){
  const g = state.games.find(x=>x.id===gameId); if(!g) return;
  navigate("game",{gameId, tournamentId:g.tournamentId||null});
}

  const s = {

  ]);
  step2.appendChild(modeSeg);
  const pairView = el("div",{id:"ngPairView"});
  step2.appendChild(pairView);
  body.appendChild(step2);

  // Step 3: Points
  const step3 = el("div",{class:"field"});
  step3.innerHTML = `<label>Paso 3 · Puntos para ganar</label>`;
  const ptsSeg = el("div",{class:"segment"});
  [50,100,150,200].forEach(v=>{
    const b = el("button",{class:v===s.pts?"active":"",onclick:(e)=>{
      e.preventDefault();
      ptsSeg.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active"); s.pts = v;
      customPts.value = "";
    }}, v+"");
    ptsSeg.appendChild(b);
  });
  step3.appendChild(ptsSeg);
  const customPts = el("input",{type:"number", min:"10", max:"500", step:"5", placeholder:"Otro valor (ej. 75)", style:"margin-top:8px;width:100%;height:44px;padding:0 14px;background:var(--bg-2);border:1px solid var(--border);border-radius:10px;color:var(--text)"});
  customPts.addEventListener("input", ()=>{
    const v = parseInt(customPts.value,10);
    if(v>=10 && v<=500){ s.pts = v; ptsSeg.querySelectorAll("button").forEach(x=>x.classList.remove("active")); }
  });
  step3.appendChild(customPts);
  body.appendChild(step3);

  function renderPlayerList(){
    playerList.innerHTML = "";
    const sorted = [...state.players].sort((a,b)=>a.name.localeCompare(b.name,"es"));
    sorted.forEach(p=>{
      const selected = s.selected.includes(p.id);
      const row = el("button",{class:"pick-row"+(selected?" selected":"")});
      row.type = "button";
      row.innerHTML = `
        <div class="avatar ${avatarClass(p.id)}">${esc(initials(p.name))}</div>

      `;

        refreshStep1();
      });
      playerList.appendChild(row);
    });
  }
  function refreshStep1(){
    // update selected summary
    summary.innerHTML = "";
    if(!s.selected.length){
      summary.appendChild(el("span",{class:"tiny mute"},"Toca a los 4 jugadores que jugarán"));
    } else {
      s.selected.forEach(pid=>{
        const p = byId(pid); if(!p) return;
        const chip = el("span",{class:"sel-chip"},[
          el("span",{class:"av "+avatarClass(p.id)}, initials(p.name)),
          p.name

        summary.appendChild(chip);
      });

      step2.style.display = "";

    } else {
      step2.style.display = "none";

  function setMode(mode){
    s.mode = mode;
    modeSeg.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
    modeSeg.querySelector(mode==="random"?"button:first-child":"button:last-child").classList.add("active");
    if(mode==="random") randomPair();
    else { s.assign = {}; renderPairView(); }
  }
  function randomPair(){
    const sh = shuffle(s.selected);
    s.assign = {[sh[0]]:"A",[sh[1]]:"A",[sh[2]]:"B",[sh[3]]:"B"};
    renderPairView();
  }
  function renderPairView(){
    pairView.innerHTML = "";
    const boxes = el("div",{class:"pair-boxes"});
    const boxA = el("div",{class:"pair-box A"});
    boxA.innerHTML = `<div class="t">Pareja A</div>`;
    const boxB = el("div",{class:"pair-box B"});
    boxB.innerHTML = `<div class="t">Pareja B</div>`;
    const aPlayers = s.selected.filter(pid=>s.assign[pid]==="A");
    const bPlayers = s.selected.filter(pid=>s.assign[pid]==="B");
    if(aPlayers.length) aPlayers.forEach(pid=>boxA.appendChild(el("div",{class:"n"}, byId(pid)?.name||"?")));
    else boxA.appendChild(el("div",{class:"empty-slot"},"—"));
    boxA.appendChild(el("div",{class:"count"}, aPlayers.length+"/2"));
    if(bPlayers.length) bPlayers.forEach(pid=>boxB.appendChild(el("div",{class:"n"}, byId(pid)?.name||"?")));
    else boxB.appendChild(el("div",{class:"empty-slot"},"—"));
    boxB.appendChild(el("div",{class:"count"}, bPlayers.length+"/2"));
    boxes.appendChild(boxA); boxes.appendChild(boxB);
    pairView.appendChild(boxes);

    if(s.mode==="random"){
      const reroll = el("button",{class:"btn btn-ghost block", onclick:e=>{e.preventDefault();randomPair();toast("Parejas sorteadas 🎲")}},[
        el("span",{html:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="M4 4l5 5"/></svg>`}),
        " Volver a sortear"
      ]);
      pairView.appendChild(reroll);
      pairView.appendChild(el("div",{class:"tiny dim mt-8 center"},"Puedes volver a sortear hasta que te guste la combinación."));
    } else {
      // manual: show 4 rows with A/B toggle
      const wrap = el("div");
      s.selected.forEach(pid=>{
        const p = byId(pid); if(!p) return;
        const row = el("div",{class:"pick-row"});
        row.innerHTML = `
          <div class="avatar ${avatarClass(p.id)}">${esc(initials(p.name))}</div>
          <div class="info"><div class="name truncate">${esc(p.name)}</div></div>
        `;
        const toggle = el("div",{class:"ab-toggle"});
        const btnA = el("button",{class:"a"+(s.assign[pid]==="A"?" active":""), onclick:e=>{e.preventDefault();setAssign(pid,"A")}}, "A");
        const btnB = el("button",{class:"b"+(s.assign[pid]==="B"?" active":""), onclick:e=>{e.preventDefault();setAssign(pid,"B")}}, "B");
        toggle.appendChild(btnA); toggle.appendChild(btnB);
        row.appendChild(toggle);
        wrap.appendChild(row);
      });
      pairView.appendChild(wrap);
      const hint = el("div",{class:"tiny dim mt-8 center"},"Asigna cada jugador a Pareja A o B (2 y 2).");
      pairView.appendChild(hint);
    }
  }
  function setAssign(pid, team){
    const aCount = s.selected.filter(x=>s.assign[x]==="A").length;
    const bCount = s.selected.filter(x=>s.assign[x]==="B").length;
    const cur = s.assign[pid];
    if(cur===team){ delete s.assign[pid]; renderPairView(); return; }
    // if target already has 2, swap
    if(team==="A" && aCount>=2){
      const toMove = s.selected.find(x=>s.assign[x]==="A" && x!==pid);
      if(toMove) s.assign[toMove] = "B";
    }
    if(team==="B" && bCount>=2){
      const toMove = s.selected.find(x=>s.assign[x]==="B" && x!==pid);
      if(toMove) s.assign[toMove] = "A";
    }
    s.assign[pid] = team;
    renderPairView();
  }

  refreshStep1();
  if(ctx.selected && ctx.selected.length===4){
    // e.g. rematch
    if(ctx.teamA) ctx.teamA.forEach(id=>s.assign[id]="A");
    if(ctx.teamB) ctx.teamB.forEach(id=>s.assign[id]="B");
    setMode("manual");
  }

  openModal({
    title: "Nueva partida",
    body,
    actions:[
      {label:"Cancelar", class:"btn-ghost"},
      {label:"Comenzar", class:"btn-primary", onClick:()=>{
        if(s.selected.length!==4){ toast("Selecciona 4 jugadores","error"); return false; }
        const a = s.selected.filter(x=>s.assign[x]==="A");
        const b = s.selected.filter(x=>s.assign[x]==="B");
        if(a.length!==2||b.length!==2){ toast("Cada pareja debe tener 2 jugadores","error"); return false; }
        const pts = s.pts>=10?s.pts:100;
        const game = {
          id: uid("game"),
          teamA:{playerIds:a}, teamB:{playerIds:b},
          pointsToWin: pts,
          rounds:[], status:"active", winnerTeam:null,
          tournamentId: ctx.tournamentId || null,
          startedAt: nowISO(), finishedAt:null
        };
        state.games.push(game);
        state.settings.defaultPoints = pts;
        saveState();
        openGame(game.id);
      }}
    ]
  });
}

let roundSide = "A";

function renderGame(){
  const g = state.games.find(x=>x.id===navContext.gameId);
  const host = $("#gameDetail");
  host.innerHTML = "";
  if(!g){
    host.appendChild(el("div",{class:"empty card"},[
      el("h3",{}, "Partida no encontrada"),
      el("button",{class:"btn btn-primary mt-10", onclick:()=>navigate("home")}, "Volver")
    ]));
    return;
  }
  const {scoreA, scoreB} = tallyGame(g);
  const winner = g.winnerTeam;
  const pctA = Math.min(100, Math.round((scoreA/g.pointsToWin)*100));
  const pctB = Math.min(100, Math.round((scoreB/g.pointsToWin)*100));
  const aName = pairName(g.teamA.playerIds);
  const bName = pairName(g.teamB.playerIds);

  const sb = el("div",{class:"scoreboard"});
  sb.innerHTML = `
    <div class="score-side A">
      <div><span class="tag">Pareja A</span><div class="tname">${esc(aName)}</div></div>
      <div>
        <div class="tscore ${winner==="A"?"won":""}">${scoreA}</div>
        <div class="progress"><span style="width:${pctA}%"></span></div>
      </div>
    </div>
    <div class="score-side B">
      <div><span class="tag">Pareja B</span><div class="tname">${esc(bName)}</div></div>
      <div>
        <div class="tscore ${winner==="B"?"won":""}">${scoreB}</div>
        <div class="progress"><span style="width:${pctB}%"></span></div>
      </div>
    </div>
  `;
  host.appendChild(sb);

  const meta = el("div",{class:"card mt-14"},[
    el("div",{class:"row space-between"},[
      el("div",{},[
        el("div",{class:"tiny dim"},"Meta"),
        el("div",{class:"title-md"}, g.pointsToWin+" puntos")
      ]),
      el("div",{style:"text-align:right"},[
        el("div",{class:"tiny dim"}, g.status==="finished"?"Finalizada":"En curso"),
        el("div",{class:"title-md"}, formatDate(g.startedAt,{short:true}))
      ])
    ])
  ]);
  host.appendChild(meta);

  if(g.status==="active"){
    const panel = el("div",{class:"card round-panel"});
    panel.innerHTML = `
      <div class="row space-between mb-10">
        <div class="title-md">Registrar puntos</div>
        <div class="tiny dim">¿Quién suma?</div>
      </div>
      <div class="round-tabs" id="rtabs">
        <button class="A ${roundSide==='A'?'active':''}" onclick="setRoundSide('A')">${esc(aName)}</button>
        <button class="B ${roundSide==='B'?'active':''}" onclick="setRoundSide('B')">${esc(bName)}</button>
      </div>
      <div class="chips-grid">
        ${[5,10,15,20,25,30,35,40].map(v=>`<button class="chip-btn" onclick="addPoints(${v})">+${v}</button>`).join("")}
      </div>
      <div class="add-custom">
        <input type="number" id="customPts" placeholder="Otro valor" min="1" max="200" />
        <button class="btn btn-outline-primary" onclick="addCustomPts()">Sumar</button>
      </div>
      <div class="mt-14 row gap-8" style="flex-wrap:wrap">
        <button class="btn sm btn-ghost" onclick="undoLastRound()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M3 13c1.5-3.5 5-6 9-6a9 9 0 0 1 0 18"/></svg>
          Anular último
        </button>
        <button class="btn sm btn-ghost" onclick="markCapicua()">🀄 Capicúa +30</button>
        <button class="btn sm btn-ghost" onclick="markTranque()">Tranque</button>
        <div class="flex-1"></div>
        <button class="btn sm btn-danger" onclick="abandonGame()">Abandonar</button>
      </div>
    `;
    host.appendChild(panel);
  } else {
    const winPair = winner==="A"?aName:bName;
    const panel = el("div",{class:"card mt-14", style:"text-align:center"});
    panel.innerHTML = `
      <div style="font-size:34px;margin-bottom:6px">🏆</div>
      <div class="title-lg">${esc(winPair)}</div>
      <div class="dim">Ganaron ${scoreA}-${scoreB}</div>
      <div class="flex gap-8 mt-14" style="justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="rematch('${g.id}')">Revancha</button>
        <button class="btn btn-ghost" onclick="closeFinishedGame('${g.tournamentId||''}')">Cerrar</button>
      </div>
    `;
    host.appendChild(panel);
  }

  if((g.rounds||[]).length){
    const roundsCard = el("div",{class:"card mt-14"});
    roundsCard.innerHTML = `<div class="row space-between"><div class="title-md">Historial de rondas</div><div class="tiny dim">${g.rounds.length} ronda${g.rounds.length===1?"":"s"}</div></div>`;
    const list = el("div",{class:"rounds-list"});
    let accA=0, accB=0;
    g.rounds.forEach((r,i)=>{
      accA += r.teamA||0; accB += r.teamB||0;
      const row = el("div",{class:"round-row"});
      row.innerHTML = `
        <div class="num">#${i+1}</div>
        <div class="cellA ${r.teamA?'':'zero'}">${r.teamA?"+"+r.teamA:"—"}${r.capicua?' 🀄':''}${r.tranque?' ⏹':''}<div class="tiny dim">total ${accA}</div></div>
        <div class="cellB ${r.teamB?'':'zero'}">${r.teamB?"+"+r.teamB:"—"}${r.capicua?' 🀄':''}${r.tranque?' ⏹':''}<div class="tiny dim">total ${accB}</div></div>
        <button class="icon-btn del" onclick="deleteRound(${i})" title="Eliminar ronda">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
        </button>
      `;
      list.appendChild(row);
    });
    roundsCard.appendChild(list);
    host.appendChild(roundsCard);
  }
}

function setRoundSide(s){
  roundSide = s;
  $all(".round-tabs button").forEach(b=>b.classList.remove("active"));
  $(`.round-tabs button.${s}`).classList.add("active");
}
function addPoints(v){
  const g = state.games.find(x=>x.id===navContext.gameId);
  if(!g||g.status!=="active") return;
  const round = { teamA:0, teamB:0, timestamp:nowISO() };
  if(roundSide==="A") round.teamA = v; else round.teamB = v;
  g.rounds.push(round);
  const winner = checkWinner(g);
  if(winner) finishGame(g, winner); else { saveState(); renderGame(); }
}
function addCustomPts(){
  const v = parseInt($("#customPts").value,10);
  if(!v||v<=0){ toast("Valor inválido","error"); return }
  addPoints(v); $("#customPts").value = "";
}
function markCapicua(){
  const g = state.games.find(x=>x.id===navContext.gameId);
  if(!g||g.status!=="active") return;
  const round = { teamA:0, teamB:0, capicua:true, timestamp:nowISO() };
  if(roundSide==="A") round.teamA = 30; else round.teamB = 30;
  g.rounds.push(round);
  const winner = checkWinner(g);
  if(winner) finishGame(g, winner);
  else { saveState(); renderGame(); toast("¡Capicúa! +30 🀄"); }
}
function markTranque(){
  const g = state.games.find(x=>x.id===navContext.gameId);
  if(!g||g.status!=="active") return;
  g.rounds.push({ teamA:0, teamB:0, tranque:true, timestamp:nowISO() });
  saveState(); renderGame(); toast("Tranque registrado");
}
function undoLastRound(){
  const g = state.games.find(x=>x.id===navContext.gameId);
  if(!g||!g.rounds.length) return;
  g.rounds.pop();
  saveState(); renderGame(); toast("Ronda anulada");
}
function deleteRound(idx){
  const g = state.games.find(x=>x.id===navContext.gameId);
  if(!g) return;
  g.rounds.splice(idx,1);
  saveState(); renderGame();
}
function abandonGame(){
  const g = state.games.find(x=>x.id===navContext.gameId);
  if(!g) return;
  confirm2({
    title:"¿Abandonar partida?",
    message:"La partida se eliminará y no se guardará.",
    confirmLabel:"Abandonar", danger:true,
    onConfirm:()=>{
      const tid = g.tournamentId;
      state.games = state.games.filter(x=>x.id!==g.id);
      saveState(); toast("Partida eliminada");
      if(tid) navigate("tournament",{tournamentId:tid}); else navigate("home");
    }
  });
}
function finishGame(g, winnerTeam){
  g.status = "finished";
  g.winnerTeam = winnerTeam;
  g.finishedAt = nowISO();
  saveState();
  celebrateWinner();
  renderGame();
}
function rematch(prevId){
  const prev = state.games.find(x=>x.id===prevId); if(!prev) return;
  const selected = [...prev.teamA.playerIds, ...prev.teamB.playerIds];
  openNewGameModal({selected, teamA:prev.teamA.playerIds, teamB:prev.teamB.playerIds, pointsToWin:prev.pointsToWin, tournamentId:prev.tournamentId});
}
function closeFinishedGame(tournamentId){
  if(tournamentId) navigate("tournament",{tournamentId});
  else navigate("home");
}
function celebrateWinner(){
  const c = el("div",{class:"confetti"});
  const colors = ["#10b981","#3b82f6","#f59e0b","#ef4444","#8b5cf6","#06b6d4"];
  for(let i=0;i<90;i++){
    const s = el("span",{});
    s.style.left = Math.random()*100+"%";
    s.style.background = colors[Math.floor(Math.random()*colors.length)];
    s.style.animationDelay = (Math.random()*.5)+"s";
    s.style.animationDuration = (1.6+Math.random()*1.4)+"s";
    s.style.transform = `rotate(${Math.random()*360}deg)`;
    c.appendChild(s);
  }
  document.body.appendChild(c);
  setTimeout(()=>c.remove(), 3200);
}

function renderTournaments(){
  const list = $("#tournamentsList");
  list.innerHTML = "";
  if(!state.tournaments.length){
    list.appendChild(el("div",{class:"empty card"},[
      el("div",{class:"emoji", html:`<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>`}),
      el("h3",{},"Aún no hay pollas"),
      el("p",{},"Crea una polla con varios jugadores. Las parejas se arman al iniciar cada partida."),
      el("button",{class:"btn btn-primary mt-10", onclick:()=>openTournamentModal()}, "Crear primera polla")
    ]));
    return;
  }
  const sorted = [...state.tournaments].sort((a,b)=>{
    if(a.status!==b.status) return a.status==="active"?-1:1;
    return new Date(b.createdAt)-new Date(a.createdAt);
  });
  sorted.forEach(t=>{
    const games = state.games.filter(g=>g.tournamentId===t.id);
    const finished = games.filter(g=>g.status==="finished").length;
    const card = el("div",{class:"tourn-card "+(t.status==="active"?"active":"finished"),
      onclick:()=>navigate("tournament",{tournamentId:t.id})
    });
    card.innerHTML = `
      <div class="ico">
        ${t.status==="active"
          ? `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>`
          : `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 15 8l6 .5-4.5 4L18 19l-6-3-6 3 1.5-6.5L3 8.5 9 8Z"/></svg>`}
      </div>
      <div class="info">
        <div class="name truncate">${esc(t.name)}</div>
        <div class="meta">${t.playerIds.length} jugadores · ${finished} partidas</div>
      </div>
      <div class="status">${t.status==="active"?"Activa":"Finalizada"}</div>
    `;
    list.appendChild(card);
  });
}

function openTournamentModal(editId){
  if(state.players.length<4){
    toast("Necesitas al menos 4 jugadores","error");
    navigate("players"); return;
  }
  const existing = editId ? state.tournaments.find(t=>t.id===editId) : null;
  const s = {
    name: existing?.name||"",
    selected: existing? [...existing.playerIds] : [],
    pts: existing?.pointsToWin || state.settings.defaultPoints || 100
  };

  const body = el("div");

  // Name
  body.appendChild(el("div",{class:"field"},[
    el("label",{},"Nombre de la polla"),
    el("input",{type:"text", id:"trf_name", placeholder:"Ej. Polla sabatina 🍻", value: s.name})
  ]));

  // Players
  const plField = el("div",{class:"field"});
  plField.appendChild(el("label",{},"Jugadores participantes"));
  const plSummary = el("div",{class:"selected-summary mb-10"});
  plField.appendChild(plSummary);
  const plList = el("div",{style:"max-height:240px;overflow-y:auto"});
  plField.appendChild(plList);
  plField.appendChild(el("div",{class:"tiny dim mt-6"},"Las parejas se arman (manual o al azar) al iniciar cada partida."));
  body.appendChild(plField);

  // Points
  const ptsField = el("div",{class:"field"});
  ptsField.innerHTML = `<label>Puntos por partida</label>`;
  const ptsSeg = el("div",{class:"segment"});
  [50,100,150,200].forEach(v=>{
    const b = el("button",{class:v===s.pts?"active":"", onclick:e=>{
      e.preventDefault();
      ptsSeg.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active"); s.pts=v; ptsCustom.value="";
    }}, v+"");
    ptsSeg.appendChild(b);
  });
  ptsField.appendChild(ptsSeg);
  const ptsCustom = el("input",{type:"number",min:"10",max:"500",step:"5",placeholder:"Otro valor",style:"margin-top:8px;width:100%;height:44px;padding:0 14px;background:var(--bg-2);border:1px solid var(--border);border-radius:10px;color:var(--text)"});
  ptsCustom.addEventListener("input",()=>{const v=parseInt(ptsCustom.value,10);if(v>=10&&v<=500){s.pts=v;ptsSeg.querySelectorAll("button").forEach(x=>x.classList.remove("active"))}});
  ptsField.appendChild(ptsCustom);
  body.appendChild(ptsField);

  function refreshSummary(){
    plSummary.innerHTML = "";
    if(!s.selected.length){
      plSummary.appendChild(el("span",{class:"tiny mute"},"Toca a los jugadores participantes"));
    } else {
      s.selected.forEach(pid=>{
        const p = byId(pid); if(!p) return;
        plSummary.appendChild(el("span",{class:"sel-chip"},[
          el("span",{class:"av "+avatarClass(p.id)}, initials(p.name)),
          p.name
        ]));
      });
      plSummary.appendChild(el("span",{class:"tiny dim", style:"margin-left:auto"}, s.selected.length+" jugadores"));
    }
  }
  function refreshPlayerList(){
    plList.innerHTML = "";
    const sorted = [...state.players].sort((a,b)=>a.name.localeCompare(b.name,"es"));
    sorted.forEach(p=>{
      const sel = s.selected.includes(p.id);
      const row = el("button",{class:"pick-row"+(sel?" selected":"")});
      row.type="button";
      row.innerHTML = `
        <div class="avatar ${avatarClass(p.id)}">${esc(initials(p.name))}</div>
        <div class="info"><div class="name truncate">${esc(p.name)}</div>${p.notes?`<div class="sub truncate">${esc(p.notes)}</div>`:""}</div>
        <div class="check"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#0a1020" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      `;
      row.addEventListener("click",e=>{
        e.preventDefault();
        const idx = s.selected.indexOf(p.id);
        if(idx>=0){ s.selected.splice(idx,1); }
        else s.selected.push(p.id);
        refreshAll();
      });
      plList.appendChild(row);
    });
  }
  function refreshAll(){ refreshSummary(); refreshPlayerList(); }
  refreshAll();

  openModal({
    title: existing?"Editar polla":"Nueva polla",
    body,
    actions:[
      ...(existing?[{label:"Eliminar", class:"btn-danger", onClick:()=>{ deleteTournament(existing.id); return true; }}]:[]),
      {label:"Cancelar", class:"btn-ghost"},
      {label: existing?"Guardar":"Crear", class:"btn-primary", onClick:()=>{
        const name = $("#trf_name").value.trim();
        if(!name){ toast("Falta el nombre","error"); return false }
        if(s.selected.length<4){ toast("Selecciona al menos 4 jugadores","error"); return false }
        if(existing){
          existing.name=name; existing.playerIds=s.selected;
          existing.mode="rotating";
          existing.fixedPairs = [];
          existing.pointsToWin = s.pts;
          saveState(); toast("Polla actualizada");
          renderView(currentView); return;
        }
        const tour = {
          id: uid("tour"),
          name, playerIds:s.selected, mode:"rotating",
          fixedPairs: [],
          pointsToWin: s.pts,
          status:"active",
          createdAt: nowISO(), finishedAt:null
        };
        state.tournaments.push(tour);
        saveState(); toast("Polla creada");
        navigate("tournament",{tournamentId:tour.id});
      }}
    ]
  });
}

function deleteTournament(id){
  const t = state.tournaments.find(x=>x.id===id); if(!t) return;
  confirm2({
    title:"¿Eliminar polla?",
    message:"Se eliminará la polla y sus partidas asociadas. Esta acción no se puede deshacer.",
    confirmLabel:"Eliminar", danger:true,
    onConfirm:()=>{

function pairKey(pair){ return [...pair].sort().join("|"); }
function pairStandings(t){
  const rows = (t.fixedPairs||[]).map(p=>({pair:[...p],wins:0,losses:0,games:0,pointsFor:0,pointsAgainst:0}));
  const byKey = Object.fromEntries(rows.map(r=>[pairKey(r.pair),r]));
  state.games.filter(g=>g.tournamentId===t.id && g.status==="finished").forEach(g=>{
    const ka = pairKey(g.teamA.playerIds), kb = pairKey(g.teamB.playerIds);
    const a = byKey[ka], b = byKey[kb];
    const {scoreA,scoreB} = tallyGame(g);
    if(a){ a.games++; a.pointsFor+=scoreA; a.pointsAgainst+=scoreB; if(g.winnerTeam==="A") a.wins++; else a.losses++; }
    if(b){ b.games++; b.pointsFor+=scoreB; b.pointsAgainst+=scoreA; if(g.winnerTeam==="B") b.wins++; else b.losses++; }
  });
  return rows.map(r=>({...r, winPct: Math.round((r.wins/Math.max(1,r.games))*100)}))
    .sort((a,b)=> b.wins-a.wins || (b.pointsFor-b.pointsAgainst)-(a.pointsFor-a.pointsAgainst) || b.pointsFor-a.pointsFor);
}
function tournamentPlayerStandings(t){
  const rows = t.playerIds.map(pid=>({playerId:pid,wins:0,losses:0,games:0,pointsFor:0,pointsAgainst:0}));
  const byPid = Object.fromEntries(rows.map(r=>[r.playerId,r]));
  state.games.filter(g=>g.tournamentId===t.id && g.status==="finished").forEach(g=>{
    const {scoreA,scoreB} = tallyGame(g);
    g.teamA.playerIds.forEach(pid=>{
      const r=byPid[pid]; if(!r) return;
      r.games++; r.pointsFor+=scoreA; r.pointsAgainst+=scoreB;
      if(g.winnerTeam==="A") r.wins++; else r.losses++;
    });
    g.teamB.playerIds.forEach(pid=>{
      const r=byPid[pid]; if(!r) return;
      r.games++; r.pointsFor+=scoreB; r.pointsAgainst+=scoreA;
      if(g.winnerTeam==="B") r.wins++; else r.losses++;
    });
  });
  return rows.map(r=>({...r, winPct: Math.round((r.wins/Math.max(1,r.games))*100)}))
    .sort((a,b)=> b.wins-a.wins || b.winPct-a.winPct || (b.pointsFor-b.pointsAgainst)-(a.pointsFor-a.pointsAgainst));
}

function startTournamentGame(tId){
  const t = state.tournaments.find(x=>x.id===tId); if(!t) return;
  // Siempre: elegir 4 jugadores de la polla y armar parejas (manual o random)
  openRotatingGameModal(t);
}

function openRotatingGameModal(t){
  const s = { selected:[], assign:{}, mode:"random", pts: t.pointsToWin };
  const body = el("div");

  const step1 = el("div",{class:"field"});
  step1.appendChild(el("label",{},"Paso 1 · Selecciona 4 jugadores"));
  const summary = el("div",{class:"selected-summary"});
  step1.appendChild(summary);
  const playerList = el("div",{class:"mt-10", style:"max-height:260px;overflow-y:auto"});
  step1.appendChild(playerList);
  body.appendChild(step1);

  const step2 = el("div",{class:"field", style:"display:none"});
  step2.innerHTML = `<label>Paso 2 · Armar parejas</label>`;
  const modeSeg = el("div",{class:"segment mb-10"},[
    el("button",{class:"active", onclick:e=>{e.preventDefault();setMode("random")}},"🔀 Aleatorio"),
    el("button",{onclick:e=>{e.preventDefault();setMode("manual")}},"✋ Manual")
  ]);
  step2.appendChild(modeSeg);
  const pairView = el("div");
  step2.appendChild(pairView);
  body.appendChild(step2);

  function renderList(){
    playerList.innerHTML = "";
    t.playerIds.forEach(pid=>{
      const p = byId(pid); if(!p) return;
      const sel = s.selected.includes(pid);
      const row = el("button",{class:"pick-row"+(sel?" selected":"")});
      row.type="button";
      row.innerHTML = `
        <div class="avatar ${avatarClass(p.id)}">${esc(initials(p.name))}</div>
        <div class="info"><div class="name truncate">${esc(p.name)}</div></div>
        <div class="check"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#0a1020" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      `;
      row.addEventListener("click",e=>{
        e.preventDefault();
        const idx = s.selected.indexOf(pid);
        if(idx>=0){ s.selected.splice(idx,1); delete s.assign[pid]; }
        else if(s.selected.length<4){ s.selected.push(pid); }
        else { toast("Máximo 4 jugadores","error"); return; }
        refresh();
      });
      playerList.appendChild(row);
    });
  }
  function refresh(){
    summary.innerHTML = "";
    if(!s.selected.length) summary.appendChild(el("span",{class:"tiny mute"},"Toca a 4 jugadores inscritos"));
    else{
      s.selected.forEach(pid=>{const p=byId(pid);summary.appendChild(el("span",{class:"sel-chip"},[el("span",{class:"av "+avatarClass(p.id)},initials(p.name)),p.name]))});
      summary.appendChild(el("span",{class:"tiny dim", style:"margin-left:auto"}, s.selected.length+"/4"));
    }
    renderList();
    if(s.selected.length===4){ step2.style.display=""; renderPair(); } else { step2.style.display="none"; }
  }
  function setMode(m){
    s.mode = m;
    modeSeg.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
    modeSeg.querySelector(m==="random"?"button:first-child":"button:last-child").classList.add("active");
    if(m==="random"){ const sh=shuffle(s.selected); s.assign = {[sh[0]]:"A",[sh[1]]:"A",[sh[2]]:"B",[sh[3]]:"B"}; }
    else s.assign = {};
    renderPair();
  }
  function renderPair(){
    pairView.innerHTML = "";
    const boxes = el("div",{class:"pair-boxes"});
    const boxA = el("div",{class:"pair-box A"}); boxA.innerHTML = `<div class="t">Pareja A</div>`;
    const boxB = el("div",{class:"pair-box B"}); boxB.innerHTML = `<div class="t">Pareja B</div>`;
    const aP = s.selected.filter(x=>s.assign[x]==="A");
    const bP = s.selected.filter(x=>s.assign[x]==="B");
    if(aP.length) aP.forEach(pid=>boxA.appendChild(el("div",{class:"n"}, byId(pid)?.name||"?"))); else boxA.appendChild(el("div",{class:"empty-slot"},"—"));
    boxA.appendChild(el("div",{class:"count"}, aP.length+"/2"));
    if(bP.length) bP.forEach(pid=>boxB.appendChild(el("div",{class:"n"}, byId(pid)?.name||"?"))); else boxB.appendChild(el("div",{class:"empty-slot"},"—"));
    boxB.appendChild(el("div",{class:"count"}, bP.length+"/2"));
    boxes.appendChild(boxA); boxes.appendChild(boxB);
    pairView.appendChild(boxes);
    if(s.mode==="random"){
      const reroll = el("button",{class:"btn btn-ghost block", onclick:e=>{e.preventDefault();const sh=shuffle(s.selected);s.assign={[sh[0]]:"A",[sh[1]]:"A",[sh[2]]:"B",[sh[3]]:"B"};renderPair();toast("Parejas sorteadas 🎲")}},"🎲 Volver a sortear");
      pairView.appendChild(reroll);
    } else {
      const wrap = el("div");
      s.selected.forEach(pid=>{
        const p = byId(pid); if(!p) return;
        const row = el("div",{class:"pick-row"});
        row.innerHTML = `<div class="avatar ${avatarClass(p.id)}">${esc(initials(p.name))}</div><div class="info"><div class="name truncate">${esc(p.name)}</div></div>`;
        const tog = el("div",{class:"ab-toggle"});
        const bA = el("button",{class:"a"+(s.assign[pid]==="A"?" active":""), onclick:e=>{e.preventDefault();toggleAssign(pid,"A")}},"A");
        const bB = el("button",{class:"b"+(s.assign[pid]==="B"?" active":""), onclick:e=>{e.preventDefault();toggleAssign(pid,"B")}},"B");
        tog.appendChild(bA); tog.appendChild(bB);
        row.appendChild(tog);
        wrap.appendChild(row);
      });
      pairView.appendChild(wrap);
    }
  }
  function toggleAssign(pid, team){
    const aCnt = s.selected.filter(x=>s.assign[x]==="A").length;
    const bCnt = s.selected.filter(x=>s.assign[x]==="B").length;
    if(s.assign[pid]===team){ delete s.assign[pid]; renderPair(); return; }
    if(team==="A" && aCnt>=2){ const m=s.selected.find(x=>s.assign[x]==="A"&&x!==pid); if(m) s.assign[m]="B"; }
    if(team==="B" && bCnt>=2){ const m=s.selected.find(x=>s.assign[x]==="B"&&x!==pid); if(m) s.assign[m]="A"; }
    s.assign[pid] = team; renderPair();
  }

  refresh();

  openModal({
    title:"Nueva partida · rotación",
    body,
    actions:[
      {label:"Cancelar", class:"btn-ghost"},
      {label:"Comenzar", class:"btn-primary", onClick:()=>{
        if(s.selected.length!==4){ toast("Selecciona 4 jugadores","error"); return false; }
        const a = s.selected.filter(x=>s.assign[x]==="A");
        const b = s.selected.filter(x=>s.assign[x]==="B");
        if(a.length!==2||b.length!==2){ toast("Cada pareja debe tener 2 jugadores","error"); return false; }
        const game = {
          id: uid("game"),
          teamA:{playerIds:a}, teamB:{playerIds:b},
          pointsToWin: t.pointsToWin, rounds:[], status:"active", winnerTeam:null,
          tournamentId: t.id, startedAt: nowISO(), finishedAt:null
        };
        state.games.push(game); saveState(); openGame(game.id);
      }}
    ]
  });
}

function finishTournament(id){
  const t = state.tournaments.find(x=>x.id===id); if(!t) return;
  if(state.games.some(g=>g.tournamentId===id&&g.status==="active")){ toast("Hay una partida activa. Termínala primero","error"); return; }
  if(!state.games.some(g=>g.tournamentId===id&&g.status==="finished")){ toast("Juega al menos una partida antes de finalizar","error"); return; }
  confirm2({
    title:"¿Finalizar polla?",
    message:"La polla se cerrará y no podrás añadir más partidas hasta reabrirla.",
    confirmLabel:"Finalizar",
    onConfirm:()=>{
      t.status="finished"; t.finishedAt=nowISO();
      saveState(); renderTournamentDetail(); toast("Polla finalizada 🏆");
    }
  });
}
function reopenTournament(id){
  const t = state.tournaments.find(x=>x.id===id); if(!t) return;
  t.status="active"; t.finishedAt=null;
  saveState(); renderTournamentDetail(); toast("Polla reabierta");
}

function renderHistory(){
  const filters = $("#historyFilters");
  const list = $("#historyList");
  filters.innerHTML = ""; list.innerHTML = "";
  const fin = state.games.filter(g=>g.status==="finished");
  if(!fin.length){
    list.appendChild(el("div",{class:"empty card"},[
      el("div",{class:"emoji", html:`<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>`}),
      el("h3",{},"Sin historial aún"),
      el("p",{},"Las partidas terminadas aparecerán aquí. ¡Juega la primera!")
    ]));
    return;
  }
  const fb = el("div",{class:"filter-bar"});
  const selPlayer = el("select",{id:"filterPlayer"},[
    el("option",{value:""},"Todos los jugadores"),
    ...state.players.map(p=>el("option",{value:p.id}, p.name))
  ]);
  const selTour = el("select",{id:"filterTour"},[
    el("option",{value:""},"Todas"),
    el("option",{value:"none"},"Sin polla"),
    ...state.tournaments.map(t=>el("option",{value:t.id}, t.name))
  ]);
  fb.appendChild(el("span",{class:"tiny dim fw-800", style:"letter-spacing:.08em;text-transform:uppercase"},"Filtrar:"));
  fb.appendChild(selPlayer); fb.appendChild(selTour);
  filters.appendChild(fb);

  function apply(){
    const pid = selPlayer.value;
    const trid = selTour.value;
    const filtered = fin.filter(g=>{
      if(pid && !g.teamA.playerIds.includes(pid) && !g.teamB.playerIds.includes(pid)) return false;
      if(trid==="none" && g.tournamentId) return false;
      if(trid && trid!=="none" && g.tournamentId!==trid) return false;
      return true;
    }).sort((a,b)=>new Date(b.finishedAt||b.startedAt)-new Date(a.finishedAt||a.startedAt));
    list.innerHTML = "";
    if(!filtered.length){ list.appendChild(el("div",{class:"empty card"},[el("p",{},"No hay partidas con estos filtros")])); return; }
    let lastDay = "";
    filtered.forEach(g=>{
      const d = new Date(g.finishedAt||g.startedAt);
      const day = d.toDateString();
      if(day!==lastDay){
        lastDay = day;
        const label = (function(){
          const today = new Date(); today.setHours(0,0,0,0);
          const dd = new Date(d); dd.setHours(0,0,0,0);
          const diff = (today-dd)/(1000*60*60*24);
          if(diff===0) return "Hoy";
          if(diff===1) return "Ayer";
          return d.toLocaleDateString("es",{weekday:"long",day:"2-digit",month:"long"});
        })();
        list.appendChild(el("div",{class:"section-title", style:"margin-top:16px"},[el("h2",{},label)]));
      }
      const {scoreA,scoreB} = tallyGame(g);
      const tourName = g.tournamentId ? state.tournaments.find(t=>t.id===g.tournamentId)?.name : null;
      const row = el("div",{class:"history-row", onclick:()=>openGame(g.id)});
      row.innerHTML = `
        <div style="flex:1;min-width:0">
          <div class="date">${d.toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"})}${tourName?" · 🏆 "+esc(tourName):""}</div>
          <div class="matchup truncate">${esc(pairName(g.teamA.playerIds))}<span class="vs">vs</span>${esc(pairName(g.teamB.playerIds))}</div>
        </div>
        <div class="final">
          <div><span class="${g.winnerTeam==="A"?"w":"l"}">${scoreA}</span> — <span class="${g.winnerTeam==="B"?"w":"l"}">${scoreB}</span></div>
          <div class="tiny dim">hasta ${g.pointsToWin}</div>
        </div>
      `;
      list.appendChild(row);
    });
  }
  selPlayer.addEventListener("change", apply);
  selTour.addEventListener("change", apply);
  apply();
}

function renderPlayerStats(){

  const host = $("#playerStatsDetail");

  if(!p){ host.appendChild(el("div",{class:"empty card"},[el("h3",{},"Jugador no encontrado")])); return; }
  const rank = computeRanking().find(r=>r.playerId===p.id) || {wins:0,losses:0,games:0,pointsFor:0,pointsAgainst:0,winPct:0};
  const myGames = state.games.filter(g=>g.status==="finished" && (g.teamA.playerIds.includes(p.id)||g.teamB.playerIds.includes(p.id)))
    .sort((a,b)=>new Date(b.finishedAt)-new Date(a.finishedAt));

  // Favorite partner: most frequent pair
  const partnerCount = {};
  const partnerWins = {};
  myGames.forEach(g=>{
    const team = g.teamA.playerIds.includes(p.id) ? g.teamA.playerIds : g.teamB.playerIds;
    const mate = team.find(x=>x!==p.id);
    if(!mate) return;
    partnerCount[mate] = (partnerCount[mate]||0)+1;
    const won = (g.teamA.playerIds.includes(p.id) && g.winnerTeam==="A") || (g.teamB.playerIds.includes(p.id) && g.winnerTeam==="B");
    partnerWins[mate] = (partnerWins[mate]||0)+(won?1:0);
  });
  const favoriteMate = Object.entries(partnerCount).sort((a,b)=>b[1]-a[1])[0];

  const header = el("div",{class:"card card-hero"});
  header.innerHTML = `
    <div class="row gap-16">
      <div class="avatar ${avatarClass(p.id)}" style="width:64px;height:64px;border-radius:20px;font-size:20px">${esc(initials(p.name))}</div>
      <div style="flex:1;min-width:0">
        <div class="title-lg truncate">${esc(p.name)}</div>
        ${p.notes?`<div class="dim small truncate">${esc(p.notes)}</div>`:""}
        ${favoriteMate?`<div class="tiny mute mt-8">Pareja favorita: ${esc(byId(favoriteMate[0])?.name||"?")} (${favoriteMate[1]} veces)</div>`:""}
      </div>
      <button class="icon-btn" onclick="openPlayerModal('${p.id}')" title="Editar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </button>
    </div>
  `;
  host.appendChild(header);

  const stats = el("div",{class:"stats mt-14"});
  stats.innerHTML = `
    <div class="stat"><div class="n primary">${rank.wins}</div><div class="l">Victorias</div></div>
    <div class="stat"><div class="n">${rank.losses}</div><div class="l">Derrotas</div></div>
    <div class="stat"><div class="n warn">${rank.games?rank.winPct+"%":"—"}</div><div class="l">Efectividad</div></div>
  `;
  host.appendChild(stats);

  const stats2 = el("div",{class:"stats mt-8"});
  stats2.innerHTML = `
    <div class="stat"><div class="n">${rank.pointsFor}</div><div class="l">Pts a favor</div></div>
    <div class="stat"><div class="n">${rank.pointsAgainst}</div><div class="l">En contra</div></div>
    <div class="stat"><div class="n">${rank.games}</div><div class="l">Partidas</div></div>
  `;
  host.appendChild(stats2);

  const card = el("div",{class:"card mt-14"});
  card.innerHTML = `<div class="title-md mb-10">Últimas partidas</div>`;
  if(!myGames.length) card.appendChild(el("div",{class:"dim small"},"Sin partidas registradas."));
  else {
    myGames.slice(0,10).forEach(g=>{
      const {scoreA,scoreB} = tallyGame(g);
      const playerInA = g.teamA.playerIds.includes(p.id);
      const won = (playerInA && g.winnerTeam==="A") || (!playerInA && g.winnerTeam==="B");
      const row = el("div",{class:"history-row", style:"margin-bottom:6px", onclick:()=>openGame(g.id)});
      row.innerHTML = `
        <div style="flex:1;min-width:0">
          <div class="date">${formatDate(g.finishedAt||g.startedAt,{short:true})}</div>
          <div class="matchup truncate">${esc(pairName(g.teamA.playerIds))}<span class="vs">vs</span>${esc(pairName(g.teamB.playerIds))}</div>
        </div>
        <div class="final">
          <div><span class="${g.winnerTeam==="A"?"w":"l"}">${scoreA}</span> — <span class="${g.winnerTeam==="B"?"w":"l"}">${scoreB}</span></div>
          <div class="tiny ${won?"primary fw-800":"dim"}">${won?"Victoria":"Derrota"}</div>
        </div>
      `;
      card.appendChild(row);
    });
  }
  host.appendChild(card);

  const actions = el("div",{class:"row gap-8 mt-14"});
  actions.appendChild(el("button",{class:"btn btn-primary flex-1", onclick:()=>openNewGameModal({selected:[p.id]})}, "Jugar partida"));
  actions.appendChild(el("button",{class:"btn btn-danger", onclick:()=>deletePlayer(p.id)}, "Eliminar"));
  host.appendChild(actions);
}

/* ================================================================
   BOOT
================================================================ */
window.addEventListener("DOMContentLoaded", ()=>{
  navigate("home");
});

// Expose for inline onclicks
Object.assign(window, {
  navigate, pushAndNavigate, closeModal,
  openPlayerModal, deletePlayer,
  openNewGameModal, openGame,
  setRoundSide, addPoints, addCustomPts, markCapicua, markTranque,
  undoLastRound, deleteRound, abandonGame, rematch, closeFinishedGame,
  openTournamentModal, deleteTournament, startTournamentGame,
  finishTournament, reopenTournament
});
</script>
</body>
</html>
